name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

env:
  LINUX_PACKAGE_NAME: cat-gatekeeper-linux-x86_64-portable
  WINDOWS_PACKAGE_NAME: cat-gatekeeper-windows-ucrt64-portable

jobs:
  linux-arch:
    name: Linux Arch
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Install checkout dependency
        run: pacman -Syu --noconfirm --needed git

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            cmake \
            extra-cmake-modules \
            ffmpeg \
            gcc \
            gzip \
            layer-shell-qt \
            make \
            pkgconf \
            qt6-base \
            systemd-libs \
            tar

      - name: Check packaging script
        run: bash -n tools/package-portable.sh

      - name: Build portable package
        run: |
          ./tools/package-portable.sh \
            --build-dir build/linux-x86_64 \
            --dist-dir dist \
            --package-name "$LINUX_PACKAGE_NAME"

      - name: Generate package checksum
        run: |
          cd dist
          sha256sum "$LINUX_PACKAGE_NAME.tar.gz" > "$LINUX_PACKAGE_NAME.tar.gz.sha256"
          ls -lh "$LINUX_PACKAGE_NAME.tar.gz" "$LINUX_PACKAGE_NAME.tar.gz.sha256"

      - name: Upload Linux package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.LINUX_PACKAGE_NAME }}
          path: |
            dist/${{ env.LINUX_PACKAGE_NAME }}.tar.gz
            dist/${{ env.LINUX_PACKAGE_NAME }}.tar.gz.sha256
          if-no-files-found: error

  windows-msys2-ucrt64:
    name: Windows MSYS2 UCRT64
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          path-type: inherit
          install: >-
            git
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-ffmpeg
            zip

      - name: Configure
        run: cmake -S . -B build/windows-ucrt64 -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build/windows-ucrt64 --parallel

      - name: Install
        run: cmake --install build/windows-ucrt64 --prefix "dist/$WINDOWS_PACKAGE_NAME"

      - name: Deploy runtime dependencies
        run: |
          set -euo pipefail

          package_dir="$PWD/dist/$WINDOWS_PACKAGE_NAME"
          bin_dir="$package_dir/bin"
          overlay_exe="$bin_dir/cat-gatekeeper-overlay.exe"

          if [ ! -x "$overlay_exe" ]; then
            echo "Missing overlay executable: $overlay_exe" >&2
            exit 1
          fi

          if command -v windeployqt6 >/dev/null 2>&1; then
            windeployqt6 --release "$overlay_exe"
          elif command -v windeployqt >/dev/null 2>&1; then
            windeployqt --release "$overlay_exe"
          else
            echo "windeployqt was not found" >&2
            exit 1
          fi

          deps_file="$(mktemp)"
          targets_file="$(mktemp)"

          collect_msys2_deps() {
            ldd "$1" | awk '
              /=>/ && $3 ~ /^\/ucrt64\/bin\// { print $3 }
              /^[[:space:]]*\/ucrt64\/bin\// { print $1 }
            '
          }

          while :; do
            find "$package_dir" -type f \( -name '*.exe' -o -name '*.dll' \) -print | sort -u > "$targets_file"
            before_count="$(wc -l < "$targets_file")"
            : > "$deps_file"

            while IFS= read -r target; do
              collect_msys2_deps "$target" >> "$deps_file" || true
            done < "$targets_file"

            while IFS= read -r dep; do
              [ -n "$dep" ] || continue
              dest="$bin_dir/$(basename "$dep")"
              if [ ! -f "$dest" ]; then
                cp "$dep" "$dest"
                echo "Copied $(basename "$dep")"
              fi
            done < <(sort -u "$deps_file")

            after_count="$(find "$package_dir" -type f \( -name '*.exe' -o -name '*.dll' \) -print | sort -u | wc -l)"
            if [ "$after_count" -eq "$before_count" ]; then
              break
            fi
          done

          cat > "$package_dir/README-windows.txt" <<'EOF'
          CatGatekeeperNext Windows portable build.

          Run bin\cat-gatekeeperd.exe from a normal unlocked Windows desktop session.
          Control it with bin\cat-gatekeeperctl.exe status, trigger, dismiss, or quit.
          EOF

          (cd "$package_dir" && find . -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt)
          find "$package_dir" -maxdepth 3 -type f | sort

      - name: Create Windows zip package
        run: |
          cd dist
          zip -r "$WINDOWS_PACKAGE_NAME.zip" "$WINDOWS_PACKAGE_NAME"
          sha256sum "$WINDOWS_PACKAGE_NAME.zip" > "$WINDOWS_PACKAGE_NAME.zip.sha256"
          ls -lh "$WINDOWS_PACKAGE_NAME.zip" "$WINDOWS_PACKAGE_NAME.zip.sha256"

      - name: Upload Windows package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.WINDOWS_PACKAGE_NAME }}
          path: |
            dist/${{ env.WINDOWS_PACKAGE_NAME }}.zip
            dist/${{ env.WINDOWS_PACKAGE_NAME }}.zip.sha256
          if-no-files-found: error

  release:
    name: GitHub Release
    runs-on: ubuntu-24.04
    needs:
      - linux-arch
      - windows-msys2-ucrt64
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -maxdepth 1 -type f -print | sort

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-assets/*
